name: Release (candidate no-traffic + smoke)

# YU Release & Operations OS — Phase R3.
# Build a SHA-pinned image, deploy it as a --no-traffic --tag candidate revision
# to trees-catering-ai, and run a read-only smoke test. Production traffic is
# NEVER changed here (no update-traffic). Manual trigger only — nothing runs on
# push/merge, so merging this workflow does not deploy anything.
#
# 禁止: update-traffic / production 昇格 / Scheduler / Secret / env 上書き /
#       LINE 本番送信 / GBP 投稿 / Sheets・GCS 業務書込み / 対象外事業 deploy。

on:
  workflow_dispatch:
    inputs:
      business:
        description: "release 対象事業（R3 は catering のみ許可）"
        type: choice
        options: [catering]
        default: catering

permissions:
  contents: read
  id-token: write   # WIF (Google Cloud OIDC) — release job のみ

concurrency:
  group: release-${{ github.event.inputs.business || 'catering' }}
  cancel-in-progress: false

jobs:
  candidate:
    name: candidate no-traffic + smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: production   # Owner 承認ゲート（R5）。approval 無しでは進まない
    env:
      BUSINESS: ${{ github.event.inputs.business || 'catering' }}
      PROJECT: ${{ vars.RELEASE_PROJECT }}
      REGION: ${{ vars.RELEASE_REGION }}
      AR_REPO: ${{ vars.RELEASE_AR_REPO }}
      SERVICE: trees-catering-ai   # allowlist: R3 は catering のみ
    steps:
      - name: Checkout (pinned SHA)
        uses: actions/checkout@v4

      - name: Fail-closed guards (allowlist / vars present)
        run: |
          set -euo pipefail
          [ "$BUSINESS" = "catering" ] || { echo "STOP: R3 は catering のみ ($BUSINESS)"; exit 1; }
          for v in PROJECT REGION AR_REPO; do
            eval "val=\${$v}"
            [ -n "${val:-}" ] || { echo "STOP: repo variable $v 未設定（bootstrap step8 が必要）"; exit 1; }
          done
          [ "$SERVICE" = "trees-catering-ai" ] || { echo "STOP: service allowlist 違反 ($SERVICE)"; exit 1; }

      - name: Auth to Google Cloud (WIF, no long-lived key)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.SA_DEPLOYER }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.RELEASE_PROJECT }}

      - name: Auth preflight (fail-closed, no secrets)
        run: |
          set -euo pipefail
          # 値のみ表示（token / credentials / IAM 全文は出さない）
          ACC="$(gcloud auth list --filter=status:ACTIVE --format='value(account)' | head -1)"
          PROJ="$(gcloud config get-value project 2>/dev/null || true)"
          echo "active account : ${ACC:-<none>}"
          echo "gcloud project : ${PROJ:-<none>}"
          echo "target AR host : ${REGION}-docker.pkg.dev/${PROJECT}/${AR_REPO}"
          echo "build method   : runner docker build + push (Cloud Build / staging bucket 不使用)"
          # fail-closed preflight
          [ "$ACC" = "${{ vars.SA_DEPLOYER }}" ] || { echo "STOP: active account != release-deployer ($ACC)"; exit 1; }
          [ "$PROJ" = "$PROJECT" ] || { echo "STOP: project mismatch ($PROJ != $PROJECT)"; exit 1; }
          gcloud artifacts repositories describe "$AR_REPO" --location="$REGION" --project="$PROJECT" >/dev/null 2>&1 \
            || { echo "STOP: Artifact Registry $AR_REPO へアクセス不可（artifactregistry 権限不足）"; exit 1; }
          command -v docker >/dev/null 2>&1 || { echo "STOP: docker 不在"; exit 1; }
          echo "preflight OK"

      - name: Build SHA-pinned image on runner + push to Artifact Registry
        run: |
          set -euo pipefail
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT}/${AR_REPO}/${SERVICE}:${GITHUB_SHA}"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          # 二重 Build 防止: 既存 SHA image があれば skip
          if gcloud artifacts docker images describe "$IMAGE" --project="$PROJECT" >/dev/null 2>&1; then
            echo "image already exists for $GITHUB_SHA — skip build/push"
          else
            # Cloud Build / staging bucket は使わない（bucket権限問題を回避・最小権限）。
            # 必要権限は artifactregistry.writer のみ（release-deployer に付与済み）。
            gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
            docker build --platform linux/amd64 -t "$IMAGE" .
            docker push "$IMAGE"
          fi

      - name: Deploy candidate (--no-traffic --tag candidate) — traffic 0%
        run: |
          set -euo pipefail
          # env / Secret は変更しない。traffic は既存のまま（--no-traffic）。
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --region "$REGION" --project "$PROJECT" \
            --no-traffic --tag candidate --quiet
          URL="$(gcloud run services describe "$SERVICE" --region "$REGION" --project "$PROJECT" \
                 --format='value(status.traffic.url)' | tr ' ' '\n' | grep -m1 candidate || true)"
          if [ -z "$URL" ]; then
            URL="$(gcloud run services describe "$SERVICE" --region "$REGION" --project "$PROJECT" \
                   --format='json' | python3 -c 'import json,sys;d=json.load(sys.stdin);print(next((t.get("url","") for t in d.get("status",{}).get("traffic",[]) if t.get("tag")=="candidate"),""))')"
          fi
          [ -n "$URL" ] || { echo "STOP: candidate URL を取得できません（fail-closed）"; exit 1; }
          echo "CANDIDATE_URL=$URL" >> "$GITHUB_ENV"
          echo "candidate URL: $URL"

      - name: Confirm production traffic unchanged (read-only)
        run: |
          set -euo pipefail
          gcloud run services describe "$SERVICE" --region "$REGION" --project "$PROJECT" \
            --format='value(status.traffic)' | tee /tmp/traffic.txt
          # candidate は tag のみで percent=0 のはず。100% が candidate に向いていたら STOP
          if grep -q "'tag': 'candidate'.*'percent': 100" /tmp/traffic.txt; then
            echo "STOP: candidate に traffic が向いています"; exit 1
          fi

      # Smoke は権限分離のため release-verifier(run.invoker 保有) へ認証主体を切替える。
      - name: Re-auth as release-verifier (smoke invoker)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.SA_VERIFIER }}

      - name: Smoke preflight (fail-closed, no token output)
        run: |
          set -euo pipefail
          ACC="$(gcloud auth list --filter=status:ACTIVE --format='value(account)' | head -1)"
          # ID token audience は tag URL ではなく SERVICE 本体 URL を使う（Cloud Run 仕様）。
          SERVICE_URL="$(gcloud run services describe "$SERVICE" --region "$REGION" --project "$PROJECT" \
                         --format='value(status.url)')"
          echo "smoke active account : ${ACC:-<none>}"
          echo "request host  : $(echo "$CANDIDATE_URL" | sed -E 's#https://([^/]+).*#\1#')"
          echo "audience host : $(echo "$SERVICE_URL"   | sed -E 's#https://([^/]+).*#\1#')"
          [ "$ACC" = "${{ vars.SA_VERIFIER }}" ] || { echo "STOP: smoke account != release-verifier ($ACC)"; exit 1; }
          case "$SERVICE_URL" in https://*) : ;; *) echo "STOP: SERVICE_URL が https でない/空"; exit 1 ;; esac
          case "$CANDIDATE_URL" in https://*) : ;; *) echo "STOP: CANDIDATE_URL が https でない"; exit 1 ;; esac
          # audience 生成可否だけ確認（token 値は表示しない）
          gcloud auth print-identity-token --audiences="$SERVICE_URL" >/dev/null 2>&1 \
            || { echo "STOP: ID token 生成に失敗"; exit 1; }
          echo "SERVICE_URL=$SERVICE_URL" >> "$GITHUB_ENV"
          echo "smoke preflight OK"

      - name: Read-only smoke test (candidate URL, audience=SERVICE_URL)
        run: |
          set -euo pipefail
          python3 scripts/release/smoke_test.py \
            --business "$BUSINESS" \
            --candidate-url "$CANDIDATE_URL" \
            --audience "$SERVICE_URL" | tee /tmp/smoke.json
          {
            echo "### R3 Candidate Smoke"
            echo '```json'
            cat /tmp/smoke.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summary (no traffic change)
        if: always()
        run: |
          {
            echo "### Release R3 (candidate no-traffic)"
            echo "- service: $SERVICE (candidate revision, traffic 0%)"
            echo "- production traffic: UNCHANGED (昇格していません)"
            echo "- 定期実行 / 資格情報 / 環境変数: 未変更"
          } >> "$GITHUB_STEP_SUMMARY"
