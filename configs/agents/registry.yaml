      - cloud_run_deploy
    stop_conditions:
      - scheduler_on
      - cloud_run_deploy
      - daily_post_limit_change
    skills:
      - scheduler-readiness-check
      - pre-deploy-qa
      - sop-writer
    inputs:
      - readiness_request
    outputs:
      - readiness_report
    logs:
      - data/reports
    kpis:
      - readiness_accuracy
    active: false

  - id: knowledge-agent
    name: Knowledge Agent
    role: ナレッジOSを読み取り、参照を提供する(書き込みなし)
    description: ナレッジ参照ロール(定義のみ・未稼働)
    applicable_businesses:
      - all
    read_permissions:
      - knowledge_readonly
    write_permissions: []
    external_send_permission: false
    deploy_permission: false
    scheduler_permission: false
    secret_access: false
    owner_approval_conditions: []
    stop_conditions:
      - secret_output
    skills: []
    inputs:
      - query
    outputs:
      - knowledge_reference
    logs:
      - data/reports
    kpis:
