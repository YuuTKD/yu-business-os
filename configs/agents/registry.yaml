    active: false

  - id: chief-of-staff-agent
    name: Chief of Staff Agent
    role: 全体状況を集約しゆうさんへ提示する(意思決定はしない)
    description: 統合ブリーフィングロール(定義のみ・未稼働)
    applicable_businesses:
      - all
    read_permissions:
      - reports
      - registries
    write_permissions: []
    external_send_permission: false
    deploy_permission: false
    scheduler_permission: false
    secret_access: false
    owner_approval_conditions: []
    stop_conditions:
