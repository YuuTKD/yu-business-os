# YU Business OS 2.0 — Business Config Registry (Phase B1, SHADOW MODE)
#
# Single source of truth (shadow). Loaded by core/business_config/loader.py and
# compared against legacy config by core/business_config/comparator.py.
#
# SHADOW MODE: this file is NOT a production read source. Existing code still
# reads configs/business_registry.py and _BUSINESS_CONFIGS. This registry is
# validated + diffed only. No production wiring in Phase B1.
#
# SECRET RULES (enforced by the loader):
#   * no token / api_key / secret / password / credentials VALUES
#   * environment_variable_names holds NAMES only (e.g. FOO_TOKEN)
#   * no spreadsheet-id VALUES (use the *_SPREADSHEET_ID env name instead)
#   * migration_status must be LEGACY_ONLY | SHADOW_DEFINED | VERIFIED
#     (PRODUCTION_CONNECTED is forbidden)

version: 1

businesses:
