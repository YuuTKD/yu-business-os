    active: true
    timezone: Asia/Tokyo
    currency: JPY
    owner: yuya_tokuda@trees-catering.com
    monthly_target: 500000
    services:
      cloud_run_service: tree-beauty-ai
      line: true
      threads: true
      pos: airegi
    notification_policy:
      mode: UNKNOWN
      owner_channel_env: LINE_OWNER_TOKEN
      staff_channel_env: LINE_STAFF_TOKEN
    automation_policy:
