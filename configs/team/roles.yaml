  - num: 18
    id: publish
    name_ja: 公開統括
    division: publish
    parent: pm
    mission: 品質・リスク・公開可否の統括（公開は人間承認）
    outputs:
      - 公開判定
      - チェック結果
    keywords:
      - 公開
      - リリース
      - 品質
      - リスク
      - 承認
