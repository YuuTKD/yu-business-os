# YU 売上成長オペレーションチーム — 役割 SSOT
# 各事業の「利益を伸ばす」ための運営チーム。運営統括AI(ops)が事業ごとに編成し、
# 新メニュー提案・市場リサーチ・売上/原価分析・集客・価格/粗利改善・リピート施策
# までを行う。すべて**提案・分析・下書きまで**。投稿/送信/価格変更/仕入変更/公開は人間承認後のみ。
# 注意: block style のみ（CI の簡易 YAML パーサは inline flow を非対応）。
version: 1

common_guardrails:
  - 価格変更・仕入変更・投稿・送信・公開・決済は人間承認後のみ（提案・分析まで）
  - secret/token/credentials/個人情報を出力・保存しない
  - 数値は入力・既存データに基づく。不明は「未確認」とし推測で断定しない

# 事業タイプ別の「効く打ち手」テンプレ（growth_plan が参照）
business_types:
  izakaya:
    label: 立ち飲み・居酒屋
    match:
      - 立ち飲み
      - タチノミヤ
      - tachinomiya
      - 居酒屋
      - バー
      - 東町
    menu_ideas:
      - 原価率の低い「名物一品」＋ドリンクのセット化で客単価UP
      - 曜日・時間帯限定の集客メニュー（暇な時間帯を埋める）
      - 常連向け「今月の新作」ローテーションで再来動機
    levers:
      - 客単価
      - 回転
      - 曜日時間帯の平準化
      - 常連リピート
  catering:
    label: ケータリング
    match:
      - ケータリング
      - catering
      - 仕出し
      - パーティー
    menu_ideas:
      - 人数帯別パッケージ（10/20/30名）で見積即答→受注率UP
      - 季節・イベント別の限定プランで単価UP
      - 定例契約（四半期）で幹事の手間を減らしLTV向上
    levers:
      - 受注率
      - 平均単価
      - リピート契約
      - 紹介
  salon:
    label: 美容・脱毛サロン
    match:
      - tree beauty
      - ビューティ
      - 脱毛
      - サロン
      - エステ
    menu_ideas:
      - 回数券・サブスクで前受け＆継続率UP
      - 部位追加・ホームケア物販でアップセル
      - 初回→2回目の再来導線（次回予約特典）
    levers:
      - 継続率
      - 客単価
      - 次回予約率
      - 口コミ
  hotpot:
    label: 火鍋・飲食
    match:
      - 琉球火鍋
      - 火鍋
      - hot pot
    menu_ideas:
      - コース＋飲み放題のセットで単価安定
      - 締めメニュー・追加具材のアップセル
      - 平日限定・宴会予約の獲得
    levers:
      - 客単価
      - 宴会予約
      - 原価率
      - リピート
  consulting:
    label: コンサル・BtoB
    match:
      - コンサル
      - consult
      - btob
      - 顧問
    menu_ideas:
      - 単発→継続顧問へのアップセル設計
      - 成果連動・パッケージ化で受注しやすく
      - 既存顧客からの紹介プログラム
    levers:
      - 受注率
      - 単価
      - 継続率
      - 紹介
  net_business:
    label: AIネットビジネス
    match:
      - aiネット
      - ネットビジネス
      - 物販
      - せどり
    menu_ideas:
      - 高粗利商品の比率を上げる商品構成見直し
      - LTV重視のリピート導線（同梱・フォロー）
      - 広告→LP→CVの各段階の改善
    levers:
      - 粗利率
      - LTV
      - CVR
      - 広告効率

roles:
  - num: 1
    id: ops
    name_ja: 運営統括AI
    division: ""
    parent: ""
    mission: 事業ごとに利益成長を統括。KPI設定・打ち手の優先順位・進行管理
    outputs:
      - 成長プラン
      - 優先順位
      - 要判断Yes/No
    keywords: []

  - num: 2
    id: product
    name_ja: 商品開発統括
    division: product
    parent: ops
    mission: 新メニュー・新商品・セット/コースの提案（利益率を意識）
    outputs:
      - 新メニュー案
      - セット/コース案
    keywords:
      - 新メニュー
      - メニュー
      - 商品
      - 新商品
      - セット
      - コース
      - 開発
  - num: 3
    id: research
    name_ja: 市場リサーチ統括
    division: research
    parent: ops
    mission: 市場・競合・トレンド・顧客ニーズの調査観点を提示
    outputs:
      - リサーチ観点
      - 競合比較案
    keywords:
      - リサーチ
      - 市場
      - 競合
      - トレンド
      - ニーズ
      - 調査
  - num: 4
    id: analytics
    name_ja: データ分析統括
    division: analytics
    parent: ops
    mission: 売上・客数・客単価・原価・粗利・曜日時間帯の分析観点とKPIを提示
    outputs:
      - 分析KPI
      - 見るべき数値
    keywords:
      - 分析
      - 売上
      - 客単価
      - 原価
      - 粗利
      - 利益
      - kpi
      - データ
    skills:
      - core/profit_leak.py
      - core/cash_flow.py
  - num: 5
    id: marketing
    name_ja: 集客統括
    division: marketing
    parent: ops
    mission: 集客チャネル（MEO/SNS/口コミ）の施策設計（投稿は人間承認）
    outputs:
      - 集客施策案
    keywords:
      - 集客
      - 広告
      - マーケ
      - 認知
    skills:
      - core/sns_pdca.py
      - core/growth_engines.py
  - num: 6
    id: meo
    name_ja: MEO
    division: marketing
    parent: marketing
    mission: Googleマップ・GBP最適化と口コミ獲得の施策
    outputs:
      - MEO施策案
    keywords:
      - meo
      - マップ
      - gbp
      - google
      - 地図
  - num: 7
    id: sns
    name_ja: SNS集客
    division: marketing
    parent: marketing
    mission: SNS投稿の勝ち筋・頻度・テーマ設計（下書き・投稿は承認）
    outputs:
      - SNS施策案
    keywords:
      - sns
      - instagram
      - threads
      - 投稿
      - フォロワー
    skills:
      - skills/sns-post-quality-check
  - num: 8
    id: review_referral
    name_ja: 口コミ・紹介
    division: marketing
    parent: marketing
    mission: 口コミ獲得・返信・紹介プログラムの設計（投稿は承認）
    outputs:
      - 口コミ/紹介施策案
    keywords:
      - 口コミ
      - レビュー
      - 紹介
      - リファラル
    skills:
      - core/review_referral.py
      - scripts/business_tools/gbp_review_reply_draft.py
  - num: 9
    id: pricing
    name_ja: 収益設計
    division: pricing
    parent: ops
    mission: 価格戦略・原価/粗利改善・アップセル/セット設計（変更は承認）
    outputs:
      - 価格/粗利改善案
    keywords:
      - 価格
      - 値付け
      - 粗利
      - 原価率
      - アップセル
      - 単価
  - num: 10
    id: crm
    name_ja: 顧客成功統括
    division: crm
    parent: ops
    mission: リピート・再来・LTV向上・失客復活の施策設計（送信は承認）
    outputs:
      - リピート施策案
    keywords:
      - リピート
      - 再来
      - ltv
      - 顧客維持
      - 常連
  - num: 11
    id: winback
    name_ja: 失客復活
    division: crm
    parent: crm
    mission: 離脱顧客の復活オファー・声かけ下書き（送信は承認）
    outputs:
      - 失客復活下書き
    keywords:
      - 失客
      - 復活
      - 離脱
      - 休眠
    skills:
      - core/growth_engines.py
      - scripts/business_tools/catering_post_event_followup.py
  - num: 12
    id: sales
    name_ja: 営業
    division: sales
    parent: ops
    mission: BtoB商談・見積・受注の設計（見積ドラフト作成・送信は承認）
    outputs:
      - 見積ドラフト
      - 商談メモ
    keywords:
      - 営業
      - 商談
      - 見積
      - 受注
      - 法人
    skills:
      - scripts/business_tools/catering_quote_draft.py

# 標準フェーズ順（利益成長の進め方）
phase_order:
  - research
  - analytics
  - product
  - pricing
  - marketing
  - meo
  - sns
  - review_referral
  - crm
  - winback
  - sales
