# YU 制作・運営チーム — 役割 SSOT（20役割 / 6ディビジョン + PM）
# 制作統括AI(pm) が指示を解析し、必要な役割だけ編成して進行管理する。
# 共通ガードレール: 送信/投稿/公開/デプロイ/決済は人間承認後のみ。secret/個人情報は出力しない。
# 注意: 本ファイルは block style のみ（CI の簡易 YAML パーサは inline flow を非対応）。
version: 1

common_guardrails:
  - 送信・投稿・公開・デプロイ・見積送付・決済は人間承認後のみ
  - secret/token/credentials/個人情報を出力・保存しない
  - 事実に基づき、不明は「未確認」とし推測しない

divisions:
  - id: sales
    num: 2
    name_ja: 営業（商務・要件統括）
  - id: research
    num: 5
    name_ja: 市場（市場・成長戦略統括）
  - id: ux
    num: 8
    name_ja: UX（クリエイティブ統括）
  - id: fe
    num: 14
    name_ja: 開発（開発・統合統括）
  - id: publish
    num: 18
    name_ja: 公開（品質・リスク統括）
  - id: analytics
    num: 19
    name_ja: 分析（グロース・顧客成功統括）

roles:
  - num: 1
    id: pm
    name_ja: 制作統括AI
    division: ""
    parent: ""
    mission: 指示解析・チーム編成・進行管理・品質と納期の統括
    outputs:
      - 編成表
      - フェーズ計画
      - 進捗サマリ
    keywords: []

  - num: 2
    id: sales
    name_ja: 営業統括
    division: sales
    parent: pm
    mission: 商務・要件の統括（受注要件と提供価値の整合）
    outputs:
      - 要件整理
      - 進め方提案
    keywords:
      - 営業
      - 商談
      - 受注
      - 案件
      - 相談
      - 依頼
  - num: 3
    id: quote
    name_ja: 見積
    division: sales
    parent: sales
    mission: 人数・予算・内容から見積ドラフトを作成（送信しない）
    outputs:
      - 見積ドラフト
    keywords:
      - 見積
      - 価格
      - 費用
      - 予算
      - 料金
    skills:
      - scripts/business_tools/catering_quote_draft.py
  - num: 4
    id: requirements
    name_ja: 要件定義
    division: sales
    parent: sales
    mission: 目的・対象・成功指標・制約を言語化し要件書ドラフト化
    outputs:
      - 要件定義ドラフト
    keywords:
      - 要件
      - 仕様
      - 目的
      - ゴール
      - スコープ

  - num: 5
    id: research
    name_ja: 市場統括
    division: research
    parent: pm
    mission: 市場・競合・成長戦略の統括
    outputs:
      - 市場メモ
      - 戦略案
    keywords:
      - 市場
      - 競合
      - 戦略
      - 成長
      - リサーチ
  - num: 6
    id: seo_meo
    name_ja: SEO/MEO
    division: research
    parent: research
    mission: 検索・地図集客の設計（キーワード・GBP最適化案）
    outputs:
      - SEO/MEO施策案
    keywords:
      - seo
      - meo
      - 検索
      - 集客
      - gbp
      - マップ
      - キーワード
  - num: 7
    id: brand
    name_ja: ブランド
    division: research
    parent: research
    mission: ブランド定義・トーン&マナー・訴求軸の整理
    outputs:
      - ブランドガイド案
    keywords:
      - ブランド
      - トンマナ
      - コンセプト
      - 世界観

  - num: 8
    id: ux
    name_ja: UX統括
    division: ux
    parent: pm
    mission: 体験・導線・クリエイティブの統括
    outputs:
      - クリエイティブ方針
    keywords:
      - ux
      - デザイン
      - クリエイティブ
      - 体験
  - num: 9
    id: ux_flow
    name_ja: 導線設計
    division: ux
    parent: ux
    mission: 情報設計・画面遷移・CVまでの導線設計
    outputs:
      - ワイヤー/導線案
    keywords:
      - 導線
      - 画面
      - 遷移
      - ワイヤー
      - 情報設計
      - cv
  - num: 10
    id: copy
    name_ja: コピー
    division: ux
    parent: ux
    mission: 見出し・本文・CTA のコピー作成（下書き）
    outputs:
      - コピー案
    keywords:
      - コピー
      - 文章
      - キャッチ
      - 見出し
      - 原稿
      - cta
    skills:
      - skills/sns-post-quality-check
  - num: 11
    id: visual
    name_ja: ビジュアル
    division: ux
    parent: ux
    mission: レイアウト・配色・トーンのビジュアル設計
    outputs:
      - ビジュアル指示
    keywords:
      - ビジュアル
      - レイアウト
      - 配色
      - デザイン案
  - num: 12
    id: assets
    name_ja: 画像・素材
    division: ux
    parent: ux
    mission: 画像・素材の在庫確認と手配（生成しない/在庫優先）
