      - 演出

  - num: 14
    id: fe
    name_ja: 開発統括
    division: fe
    parent: pm
    mission: 実装・統合の統括
    outputs:
      - 実装計画
    keywords:
      - 開発
      - 実装
      - サイト
      - lp
      - コーディング
      - フロント
  - num: 15
    id: cms
    name_ja: CMS連携
    division: fe
    parent: fe
    mission: CMS/フォーム/計測タグ等の連携設計
    outputs:
      - 連携設計
    keywords:
      - cms
      - wordpress
      - フォーム
      - 計測
      - タグ
      - 連携

  - num: 16
    id: tech_quality
    name_ja: 技術品質
    division: publish
    parent: publish
    mission: 表示・リンク・速度・アクセシビリティ等の品質チェック
    outputs:
      - 品質チェック結果
    keywords:
      - 品質
      - テスト
      - 表示
      - リンク
